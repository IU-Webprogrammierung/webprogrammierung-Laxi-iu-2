<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontakt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <header>
        <div class="container nav-wrapper">
            <a href="index.html">Logo</a>
            <nav>
                <ul class="nav-list">
                    <li><a href="index.html#travel">Reiseübersicht</a></li>
                    <li><a href="index.html#highlights">Highlights</a></li>
                    <li><a href="index.html#about">Über mich</a></li>
                    <li><a href="kontakt.html">Kontakt</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="section section-light">
            <div class="container">

                <h1>Kontakt</h1>
                <p class="contact-intro">
                    Du hast Fragen oder möchtest dich austauschen?
                    Ich freue mich über deine Nachricht.
                </p>

                <form class="contact-form">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required />

                    <label for="email">E-Mail</label>
                    <input type="email" id="email" name="email" required />

                    <label for="message">Nachricht</label>
                    <textarea id="message" name="message" rows="6" maxlength="500"></textarea>
                    <p id="chaCount">0 / 500</p>

                    <button type="submit">Absenden</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>2026 Mein Portfolio</p>
    </footer>

</body>

</html>
